name: maturity-sprint-agent
description: Track BT platform maturity across 10 dimensions, identify weakest dimension, implement fix, verify improvement, report progress. GOAP composite workflow.
version: "1.0.0"
tree: domain:goap_planning
schedule: "every 120m"
inputs:
  - name: dimensions
    type: json
    required: false
    description: Override the 10 maturity dimensions to assess
outputs:
  - name: sprint_report
    type: markdown
quality:
  required_sections: ["Current Maturity", "Weakest Dimension", "Fix Applied", "Progress"]
metadata:
  category: dev
  tags: "maturity,sprint,goap"
