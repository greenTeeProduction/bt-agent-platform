name: hermes-researcher
description: Hermes daily research agent — web search, NotebookLM queries, vault save
version: "1.0.0"
tree: research:deep_research
schedule: "0 8 * * *"
inputs:
  - name: topic
    type: text
    required: true
outputs:
  - name: findings
    type: markdown
quality:
  min_length: 200
  required_sections: ["Findings", "Sources", "Action Items"]
metadata:
  category: hermes-builtin
  tags: "research,daily,hermes"
