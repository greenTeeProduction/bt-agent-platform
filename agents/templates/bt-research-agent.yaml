name: bt-research-agent
description: Research behavior tree evolution methods. Search web, query NotebookLM, save to vault, create implementation plans. GOAP composite workflow.
version: "1.0.0"
tree: domain:goap_research
schedule: "30 8 * * *"
inputs:
  - name: topic
    type: text
    required: false
    default: "behavior tree evolution and multi-agent architectures"
