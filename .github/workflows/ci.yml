name: BT Platform CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: test -z "$(gofmt -l .)"

      - name: go mod tidy check
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is out of sync. Run 'go mod tidy' and commit the changes."
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m --out-format=colored-line-number

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: -no-fail -fmt sarif -out results.sarif -severity medium ./...

      - name: Go vulnerability check (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::Potential vulnerabilities found — review above output"

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gosec

      - name: Check for high/critical issues
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet -severity high ./...
        continue-on-error: false

  test:
    name: Test (short)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - name: Run tests
        run: go test -short -count=1 -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | grep total | awk '{print "Total coverage: " $3}'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 3

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - name: Build all binaries
        run: |
          go build -o bin/bt-agent ./cmd/bt-agent/
          go build -o bin/bt-evaluator ./cmd/bt-evaluator/
          go build -o bin/bt-langagent ./cmd/bt-langagent/
          go build -o bin/bt-dashboard ./cmd/bt-dashboard/
          go build -o bin/bt-gardener ./cmd/bt-gardener/
          go build -o bin/bt-agent-cli ./cmd/bt-agent-cli/
          go build -o bin/bt-security-probe ./cmd/bt-security-probe/
          go build -o bin/bt-ci-doctor ./cmd/bt-ci-doctor/
          go build -o bin/bt-tree-integration ./cmd/bt-tree-integration/
          go build -o bin/benchcmp ./cmd/benchcmp/
          go build -o bin/bt-scalability-probe ./cmd/bt-scalability-probe/

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, security, test, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git log since last tag

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - name: Generate release notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          bash scripts/release-notes.sh --next "$VERSION" > /tmp/release-notes.md
          echo "Release notes generated: $(wc -l < /tmp/release-notes.md) lines"

      - name: Build release binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/bt-agent-linux-amd64 ./cmd/bt-agent/
          GOOS=linux GOARCH=arm64 go build -o bin/bt-agent-linux-arm64 ./cmd/bt-agent/
          GOOS=linux GOARCH=amd64 go build -o bin/bt-evaluator-linux-amd64 ./cmd/bt-evaluator/
          GOOS=linux GOARCH=arm64 go build -o bin/bt-evaluator-linux-arm64 ./cmd/bt-evaluator/
          GOOS=linux GOARCH=amd64 go build -o bin/bt-langagent-linux-amd64 ./cmd/bt-langagent/
          GOOS=linux GOARCH=arm64 go build -o bin/bt-langagent-linux-arm64 ./cmd/bt-langagent/
          GOOS=linux GOARCH=amd64 go build -o bin/bt-dashboard-linux-amd64 ./cmd/bt-dashboard/
          GOOS=linux GOARCH=arm64 go build -o bin/bt-dashboard-linux-arm64 ./cmd/bt-dashboard/
          GOOS=linux GOARCH=amd64 go build -o bin/bt-gardener-linux-amd64 ./cmd/bt-gardener/
          GOOS=linux GOARCH=arm64 go build -o bin/bt-gardener-linux-arm64 ./cmd/bt-gardener/
          GOOS=linux GOARCH=amd64 go build -o bin/bt-security-probe-linux-amd64 ./cmd/bt-security-probe/
          GOOS=linux GOARCH=arm64 go build -o bin/bt-security-probe-linux-arm64 ./cmd/bt-security-probe/
          GOOS=linux GOARCH=amd64 go build -o bin/bt-ci-doctor-linux-amd64 ./cmd/bt-ci-doctor/
          GOOS=linux GOARCH=arm64 go build -o bin/bt-ci-doctor-linux-arm64 ./cmd/bt-ci-doctor/
          GOOS=linux GOARCH=amd64 go build -o bin/bt-tree-integration-linux-amd64 ./cmd/bt-tree-integration/
          GOOS=linux GOARCH=arm64 go build -o bin/bt-tree-integration-linux-arm64 ./cmd/bt-tree-integration/
          GOOS=linux GOARCH=amd64 go build -o bin/bt-agent-cli-linux-amd64 ./cmd/bt-agent-cli/
          GOOS=linux GOARCH=arm64 go build -o bin/bt-agent-cli-linux-arm64 ./cmd/bt-agent-cli/
          GOOS=linux GOARCH=amd64 go build -o bin/benchcmp-linux-amd64 ./cmd/benchcmp/
          GOOS=linux GOARCH=arm64 go build -o bin/benchcmp-linux-arm64 ./cmd/benchcmp/
          GOOS=linux GOARCH=amd64 go build -o bin/bt-scalability-probe-linux-amd64 ./cmd/bt-scalability-probe/
          GOOS=linux GOARCH=arm64 go build -o bin/bt-scalability-probe-linux-arm64 ./cmd/bt-scalability-probe/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          body_path: /tmp/release-notes.md
